version: "3.9"

services:
  # ── Qdrant vector database ──────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: contract_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"   # gRPC port (optional)
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: unless-stopped

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: contract_backend
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant      # use the Docker service name, not localhost
      - QDRANT_PORT=6333
    volumes:
      - ./backend:/app          # mount source for easy development iteration
    restart: unless-stopped

  # ── React frontend ──────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: contract_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE=http://localhost:8000
    restart: unless-stopped

volumes:
  qdrant_storage:
